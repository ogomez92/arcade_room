<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Choose a game to play</title>
<style>
  :root {
    color-scheme: light dark;
    --fg: #1a1a1a;
    --bg: #fafafa;
    --accent: #2d6cdf;
    --card: #fff;
    --border: #ddd;
  }
  @media (prefers-color-scheme: dark) {
    :root { --fg: #eee; --bg: #111; --accent: #6ea8ff; --card: #1c1c1c; --border: #333; }
  }
  * { box-sizing: border-box; }
  body {
    font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    color: var(--fg);
    background: var(--bg);
    margin: 0;
    padding: 2rem 1rem;
    line-height: 1.5;
  }
  main { max-width: 720px; margin: 0 auto; }
  h1 { font-size: 2rem; margin: 0 0 .25rem; }
  .lead { color: var(--fg); opacity: .75; margin: 0 0 2rem; }
  ul.games { list-style: none; padding: 0; margin: 0; display: grid; gap: .75rem; }
  ul.games a {
    display: block;
    padding: 1rem 1.25rem;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    text-decoration: none;
    color: var(--fg);
    font-size: 1.125rem;
  }
  ul.games a:hover, ul.games a:focus {
    border-color: var(--accent);
    color: var(--accent);
    outline: none;
  }
  .empty { opacity: .6; font-style: italic; }
  .sr-only {
    position: absolute;
    width: 1px; height: 1px;
    padding: 0; margin: -1px;
    overflow: hidden; clip: rect(0,0,0,0);
    white-space: nowrap; border: 0;
  }
  #wipSection { margin-top: 2.5rem; }
  #wipSection h2 { font-size: 1.25rem; margin: 0 0 .25rem; }
  .wip-warning {
    color: var(--fg);
    opacity: .75;
    margin: 0 0 1rem;
    font-size: .95rem;
  }
</style>
</head>
<body>
<main>
  <h1>Choose a game to play</h1>
  <p class="lead">A small collection of audio and arcade games by Oriol Gómez.</p>

  <section aria-labelledby="games-heading">
    <h2 id="games-heading" class="sr-only">Games</h2>
    <ul class="games" id="gameList" aria-busy="true"></ul>
  </section>

  <section aria-labelledby="wip-heading" id="wipSection" hidden>
    <h2 id="wip-heading">Active development &amp; incomplete</h2>
    <p class="wip-warning">Heads up: these are works in progress. Expect bugs, missing features, and entries that may be unplayable in their current state.</p>
    <ul class="games" id="wipList"></ul>
  </section>
</main>

<script type="application/json" id="games-data">
{{- $skip := list "template" "electron" "node_modules" -}}
{{- $items := list -}}
{{- range $name := (listFiles "/") -}}
  {{- if and (not (contains "." $name)) (not (has $name $skip)) (not (hasPrefix "!" $name)) -}}
    {{- $items = append $items $name -}}
  {{- end -}}
{{- end -}}
{{- $items | toJson -}}
</script>

<script>
  const games = JSON.parse(document.getElementById('games-data').textContent);
  const list = document.getElementById('gameList');
  const wipList = document.getElementById('wipList');
  const wipSection = document.getElementById('wipSection');
  list.removeAttribute('aria-busy');

  const ready = games.filter(n => !n.startsWith('_')).sort();
  const wip = games.filter(n => n.startsWith('_')).sort();

  function appendItem(target, name) {
    const li = document.createElement('li');
    const a = document.createElement('a');
    a.href = '/' + encodeURIComponent(name) + '/';
    const display = name.replace(/^_+/, '');
    a.textContent = display.charAt(0).toUpperCase() + display.slice(1);
    li.appendChild(a);
    target.appendChild(li);
  }

  if (ready.length === 0 && wip.length === 0) {
    list.innerHTML = '<li class="empty">No games found.</li>';
  } else {
    for (const name of ready) appendItem(list, name);
    if (wip.length > 0) {
      wipSection.hidden = false;
      for (const name of wip) appendItem(wipList, name);
    }
  }
</script>
</body>
</html>
