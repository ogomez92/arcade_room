<!DOCTYPE html>
<html lang="en-US">
  <head>
    <title>roadsplat</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="./favicon.png" />
    <link rel="stylesheet" type="text/css" href="./styles.min.css" />
  </head>
  <body role="application">
    <main class="a-app">
      <canvas class="a-app--overlaySupport"></canvas>

      <div role="status" aria-live="polite" aria-atomic="true" class="u-screenReader a-app--announce"></div>
      <div role="status" aria-live="assertive" aria-atomic="true" class="u-screenReader a-app--announce-assertive"></div>

      <div class="a-app--screen a-app--game">
        <section class="c-screen a-game" tabindex="-1" aria-label="Game">
          <h1 class="u-screenReader">roadsplat — game in progress</h1>
          <dl class="a-game--hud" aria-label="Game status">
            <dt>HP</dt><dd class="a-game--hp">100</dd>
            <dt>Level</dt><dd class="a-game--level">1</dd>
            <dt>Score</dt><dd class="a-game--score">0</dd>
            <dt>Next</dt><dd class="a-game--next">1000</dd>
            <dt>Position</dt><dd class="a-game--pos">south sidewalk</dd>
          </dl>
          <p class="a-game--help">Hold Up Arrow to walk forward, Down Arrow to walk back. F1 score · F2 health · F3 level · F4 position · I full status · Esc pause.</p>
        </section>
      </div>

      <div class="a-app--screen a-app--splash">
        <section class="c-screen a-splash" tabindex="-1">
          <h1 class="a-splash--logo">roadsplat</h1>
          <div class="a-splash--details">
            <div class="a-splash--version"></div>
            <div class="a-splash--author">audio-only road crossing</div>
          </div>
          <div class="a-splash--instruction">Press any key or click to begin</div>
        </section>
      </div>

    </main>
    <script src="./scripts.min.js"></script>
  </body>
</html>
